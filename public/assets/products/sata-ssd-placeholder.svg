<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">SAMSWEET SATA SSD placeholder visual</title>
  <desc id="desc">Premium 2.5 inch SATA SSD placeholder with silver surface and cyan edge light.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070d"/>
      <stop offset="0.55" stop-color="#09131f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="case" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f9fd"/>
      <stop offset="0.4" stop-color="#aeb9c8"/>
      <stop offset="0.7" stop-color="#eef3fa"/>
      <stop offset="1" stop-color="#4b596d"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <ellipse cx="610" cy="630" rx="430" ry="60" fill="#00c8ff" opacity="0.2" filter="url(#soft)"/>
  <g transform="translate(215 155) rotate(-5 385 240)">
    <rect x="0" y="0" width="770" height="480" rx="54" fill="#07101c" stroke="#1ad7ff" stroke-opacity="0.38" stroke-width="4"/>
    <rect x="56" y="55" width="658" height="370" rx="36" fill="url(#case)"/>
    <rect x="98" y="96" width="574" height="108" rx="22" fill="#07111f" opacity="0.88"/>
    <text x="130" y="162" fill="#ffffff" font-family="Arial, sans-serif" font-size="54" font-weight="700">SAMSWEET</text>
    <text x="130" y="222" fill="#2bd5ff" font-family="Arial, sans-serif" font-size="28" font-weight="700">2.5 SATA 3.0 SSD</text>
    <path d="M126 300 H646" stroke="#07111f" stroke-opacity="0.24" stroke-width="10" stroke-linecap="round"/>
    <path d="M126 340 H530" stroke="#07111f" stroke-opacity="0.18" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
