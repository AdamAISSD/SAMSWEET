<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">SAMSWEET PCIe SSD placeholder visual</title>
  <desc id="desc">Dark metal PCIe SSD product placeholder with cyan glow and SAMSWEET branding.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070d"/>
      <stop offset="0.55" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f7fb"/>
      <stop offset="0.18" stop-color="#9aa9ba"/>
      <stop offset="0.5" stop-color="#e8edf4"/>
      <stop offset="1" stop-color="#344253"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="850" cy="180" r="260" fill="#0fb7ff" opacity="0.16" filter="url(#glow)"/>
  <circle cx="260" cy="640" r="260" fill="#7c3cff" opacity="0.12" filter="url(#glow)"/>
  <g transform="translate(180 265) rotate(-8 420 135)">
    <rect x="0" y="0" width="840" height="270" rx="34" fill="#07111f" stroke="#2bd5ff" stroke-opacity="0.32" stroke-width="3"/>
    <rect x="46" y="42" width="550" height="186" rx="24" fill="url(#metal)" opacity="0.96"/>
    <rect x="624" y="48" width="148" height="72" rx="16" fill="#111827" stroke="#d7e1ef" stroke-opacity="0.26"/>
    <rect x="624" y="150" width="148" height="72" rx="16" fill="#111827" stroke="#d7e1ef" stroke-opacity="0.26"/>
    <circle cx="38" cy="135" r="14" fill="#cdd8e5"/>
    <circle cx="804" cy="135" r="14" fill="#cdd8e5"/>
    <text x="96" y="124" fill="#06111f" font-family="Arial, sans-serif" font-size="46" font-weight="700">SAMSWEET</text>
    <text x="98" y="172" fill="#173047" font-family="Arial, sans-serif" font-size="24" font-weight="700">PCIe NVMe SSD</text>
    <path d="M80 232 H548" stroke="#20d4ff" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
  </g>
</svg>
